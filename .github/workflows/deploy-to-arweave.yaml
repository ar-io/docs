name: Deploy to Arweave

on:
  # Trigger on push to main branch
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "content/**"
      - "scripts/**"
      - "next.config.mjs"
      - "package.json"
      - "tailwind.config.js"
      - "tsconfig.json"

  # Allow manual dispatch with custom undername
  workflow_dispatch:
    inputs:
      undername:
        description: "ArNS undername for deployment (use @ for base name)"
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn lint

  deploy:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Next.js application
        run: yarn build

      - name: Deploy to Arweave
        uses: ar-io/ar-io-deploy@v1
        with:
          deploy-key: ${{ secrets.DEPLOY_KEY }}
          arns-key: ${{ secrets.ARNS_KEY }}
          arns-name: ${{ secrets.ARNS_NAME }}
          undername: "${{ github.event_name == 'workflow_dispatch' && inputs.undername || '@' }}"
          deploy-folder: ./out
